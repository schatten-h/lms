<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Connexion</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="container">
        <h2>Connexion</h2>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" required>
            </div>
            <br>
            <button type="submit">Se connecter</button>
        </form>

        <div id="message-box"></div>
        
        <p style="text-align: center; margin-top: 1rem; font-size: 0.875rem;">
            Pas encore de compte ? <a href="/register">S'inscrire</a>
        </p>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const result = await apiCall('/auth/login', 'POST', { username, password });
                showMessage("Connexion réussie ! Redirection...", "success");
                
                setTimeout(() => {
                    if (result.role === "admin") window.location.href = "/admin";
                    else if (result.role === "teacher") window.location.href = "/enseignant";
                    else window.location.href = "/etudiant";
                }, 1000);
                
            } catch (error) {
                console.error("Erreur de connexion :", error);
            }
        });
    </script>
</body>
</html>
