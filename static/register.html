<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Inscription</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h2>Créer un compte</h2>
        <form id="register-form">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" id="reg-username" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="reg-password" required>
            </div>
            <div class="form-group">
                <label>Rôle</label>
                <select id="reg-role">
                    <option value="student">Étudiant</option>
                    <option value="teacher">Enseignant</option>
                    <option value="admin">Administrateur</option>
                </select>
            </div>
            <br>
            <button type="submit">S'inscrire</button>
        </form>
        
        <div id="message-box"></div>
        
        <p style="text-align: center; margin-top: 1rem; font-size: 0.875rem;">
            Déjà un compte ? <a href="/login">Se connecter</a>
        </p>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Empêche la page de se recharger
            
            const payload = {
                username: document.getElementById('reg-username').value,
                password: document.getElementById('reg-password').value,
                role: document.getElementById('reg-role').value
            };
            
            try {
                await apiCall('/auth/register', 'POST', payload);
                showMessage("Inscription réussie ! Redirection...", "success");
                setTimeout(() => window.location.href = "/login", 1500);
            } catch (error) {
                // L'erreur est maintenant affichée en rouge sur la page
                console.error("Détail de l'erreur :", error);
            }
        });
    </script>
</body>
</html>
