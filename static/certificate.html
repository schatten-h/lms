<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Certificat de Réussite</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .certificate-wrapper {
            background-color: #fff;
            padding: 2rem;
            border: 10px solid var(--primary);
            border-radius: 12px;
            text-align: center;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }
        .certificate-header {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
            font-family: 'Georgia', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .certificate-body {
            font-size: 1.2rem;
            margin: 2rem 0;
            line-height: 1.8;
        }
        .student-name {
            font-size: 2rem;
            font-weight: bold;
            color: var(--text-color);
            margin: 1rem 0;
            text-decoration: underline;
            text-underline-offset: 8px;
        }
        .module-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-hover);
        }
        .certificate-footer {
            margin-top: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .signature-line {
            border-top: 1px solid var(--text-color);
            width: 200px;
            padding-top: 0.5rem;
            font-size: 0.9rem;
        }
        .badge {
            width: 100px;
            height: 100px;
            background-color: #FBBF24;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 0.8rem;
            text-align: center;
            border: 4px dashed #fff;
            box-shadow: 0 0 0 4px #FBBF24;
        }
        
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none; }
            .certificate-wrapper { box-shadow: none; border-color: #333; }
        }
    </style>
</head>
<body>
    
    <div style="width: 100%; max-width: 800px; margin-bottom: 1rem;" class="no-print">
        <a href="/etudiant" style="color: var(--primary); text-decoration: none; font-weight: bold;">&larr; Retour au Dashboard</a>
        <button onclick="window.print()" style="float: right; width: auto; margin-top: 0; padding: 0.5rem 1rem;">Imprimer le Certificat</button>
    </div>

    <div class="certificate-wrapper">
        <div class="certificate-header">
            Certificat de Réussite
        </div>
        
        <div class="certificate-body">
            <p>Ceci certifie que</p>
            <div class="student-name" id="cert-student">Nom de l'étudiant</div>
            <p>a complété avec succès toutes les exigences du module de formation :</p>
            <div class="module-name" id="cert-module">Titre du Module</div>
        </div>
        
        <div class="certificate-footer">
            <div class="signature-line">
                Date de délivrance<br>
                <span id="cert-date">14 Juin 2026</span>
            </div>
            
            <div class="badge">
                LMS<br>CERTIFIED
            </div>
            
            <div class="signature-line">
                Signature de l'Instructeur<br>
                <em>Direction Académique</em>
            </div>
        </div>
    </div>

    <script>
        // Dans un cas réel, ces données viendraient d'un appel API.
        // Exemple d'hydratation statique pour la démonstration :
        const params = new URLSearchParams(window.location.search);
        
        // Si on passe des paramètres dans l'URL (ex: /certificate?student=Alice&module=Python)
        if(params.has('student')) document.getElementById('cert-student').innerText = params.get('student');
        if(params.has('module')) document.getElementById('cert-module').innerText = params.get('module');
        
        // Génère la date du jour
        const today = new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('cert-date').innerText = today;
    </script>
</body>
</html>
